experiment:
  name: baseline_2d_ae_latent64
  seed: 42

data:
  difficulty: easy
  batch_size: 16 
  num_workers: 4
  train_subset_size: null
  val_subset_size: null
  drop_invalid_channels: false

training:
  epochs: 100 
  lr: 0.001
  loss_name: hybrid_mse_sam
  debug_reconstruction_stats: true

  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.00001  

model:
  model_name: baseline_2d_ae
  model_kwargs:
    latent_channels: 64
    hidden_channels: [128, 64]

logging:
  use_wandb: true
  project: hsi-compression