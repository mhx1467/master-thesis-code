experiment:
  name: internal_baseline_1d_pixel_ae_latent16
  seed: 42

data:
  difficulty: easy
  batch_size: 4
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  prefer_npy: true
  npy_mmap: false
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null

training:
  use_amp: true
  epochs: 200
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  scheduler:
    enabled: true
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    patience: 50
    psnr_min_delta: 0.01
  sam_every_n_epochs: 10

model:
  model_name: baseline_1d_pixel_ae
  model_kwargs:
    in_channels: 202
    latent_channels: 16
    hidden_channels: 64
    output_activation: sigmoid

logging:
  use_wandb: true
  project: hsi-compression-paper
