experiment:
  name: tcn_hsi_ae_midscale
  seed: 42

data:
  difficulty: easy
  batch_size: 4
  num_workers: 0
  train_subset_size: 256
  val_subset_size: 64
  drop_invalid_channels: false

training:
  epochs: 20
  lr: 0.0001
  loss_name: masked_mse
  debug_reconstruction_stats: true
  early_stopping:
    enabled: true
    patience: 4
    min_delta: 0.0001

model:
  model_name: tcn_hsi_ae
  model_kwargs:
    encoder_channels: [128, 64]
    latent_channels: 8
    tcn_hidden_channels: 64
    tcn_num_layers: 4
    tcn_kernel_size: 3
    dropout: 0.0

logging:
  use_wandb: true
  project: hsi-compression