experiment:
  name: paper_pixelwise_spectral_mamba_ae_latent16
  seed: 42

data:
  difficulty: easy
  batch_size: 1
  num_workers: 2
  pin_memory: true
  persistent_workers: false
  prefetch_factor: 2
  prefer_npy: true
  npy_mmap: false
  debug_loader_timing: false
  drop_invalid_channels: true
  train_subset_size: 8
  val_subset_size: 8

training:
  use_amp: true
  epochs: 1
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  quantization_bits: 8
  scheduler:
    enabled: false
    name: cosine
    T_max: 1
    eta_min: 1.0e-06
  early_stopping:
    enabled: false
    patience: 10
    psnr_min_delta: 0.01

model:
  model_name: pixelwise_spectral_mamba_ae
  model_kwargs:
    in_channels: 202
    group_size: 4
    d_model: 128
    latent_channels: 16
    num_layers: 4
    mamba_d_state: 16
    mamba_d_conv: 4
    mamba_expand: 2
    pooling: attention
    refinement_hidden: 16
    chunk_size: 4096
    output_activation: sigmoid

logging:
  use_wandb: true
  project: hsi-compression-paper