experiment:
  name: baseline_2d_ae_latent8
  seed: 42

data:
  difficulty: easy
  batch_size: 4
  num_workers: 4
  train_subset_size: null
  val_subset_size: null
  drop_invalid_channels: false

training:
  epochs: 20
  lr: 0.0001
  loss_name: masked_mse
  debug_reconstruction_stats: false

  early_stopping:
    enabled: true
    patience: 4
    min_delta: 0.0001  

model:
  model_name: baseline_2d_ae
  model_kwargs:
    latent_channels: 8
    hidden_channels: [128, 64]

logging:
  use_wandb: true
  project: hsi-compression