experiment:
  name: baseline_2d_ae_midscale
  seed: 42

data:
  difficulty: easy
  batch_size: 4
  num_workers: 0
  train_subset_size: 256
  val_subset_size: 64
  drop_invalid_channels: false

training:
  epochs: 20
  lr: 0.0001
  loss_name: masked_mse
  debug_reconstruction_stats: true

model:
  model_name: baseline_2d_ae
  model_kwargs:
    latent_channels: 16
    hidden_channels: [128, 64]

logging:
  use_wandb: true
  project: hsi-compression