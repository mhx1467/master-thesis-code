experiment:
  name: mamba_hsi_ae_midscale
  seed: 42

data:
  difficulty: easy
  batch_size: 2
  num_workers: 0
  train_subset_size: 256
  val_subset_size: 64
  drop_invalid_channels: false

training:
  epochs: 20
  lr: 0.0001
  loss_name: masked_mse
  debug_reconstruction_stats: true
  early_stopping:
    enabled: true
    patience: 4
    min_delta: 0.0001

model:
  model_name: mamba_hsi_ae
  model_kwargs:
    latent_channels: 8
    d_model: 64
    num_layers: 2

logging:
  use_wandb: true
  project: hsi-compression