experiment:
  name: paper_baseline_2d_ae_latent16
  seed: 42

data:
  difficulty: easy
  batch_size: 32
  num_workers: 4
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null

training:
  epochs: 500
  lr: 0.0001
  loss_name: mse
  grad_clip_max_norm: 1.0
  quantization_bits: 8
  scheduler:
    enabled: true
    name: cosine
    T_max: 500
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    patience: 50
    min_delta: 0.01

model:
  model_name: baseline_2d_ae
  model_kwargs:
    in_channels: 202
    latent_channels: 16
    hidden_channels: [128, 64]

logging:
  use_wandb: true
  project: hsi-compression-paper
