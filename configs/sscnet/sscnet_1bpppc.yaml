experiment:
  name: sscnet_1bpppc
  seed: 42

data:
  difficulty: easy
  batch_size: 16
  num_workers: 4
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null
  prefer_npy: true
  npy_mmap: true

training:
  use_amp: true
  epochs: 200
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  scheduler:
    enabled: false
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  early_stopping:
    enabled: false
    patience: 30
    psnr_min_delta: 0.01
  sam_every_n_epochs: 10

model:
  model_name: sscnet
  model_kwargs:
    in_channels: 202
    latent_channels: 404

logging:
  use_wandb: true
  project: hsi-compression-paper
