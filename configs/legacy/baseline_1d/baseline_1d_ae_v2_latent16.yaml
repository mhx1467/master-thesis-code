experiment:
  name: paper_baseline_1d_ae_v2_latent16
  seed: 42

data:
  difficulty: easy
  batch_size: 16
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  prefer_npy: true
  npy_mmap: false
  debug_loader_timing: true
  debug_loader_warmup_batches: 4
  debug_loader_timed_batches: 16
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null

training:
  use_amp: true
  epochs: 200
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  scheduler:
    enabled: true
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    patience: 50
    psnr_min_delta: 0.01

model:
  model_name: baseline_1d_ae_v2
  model_kwargs:
    in_channels: 202
    latent_channels: 16
    spectral_hidden_channels: 64
    spatial_stem_channels: [64, 128]

logging:
  use_wandb: true
  project: hsi-compression-paper
