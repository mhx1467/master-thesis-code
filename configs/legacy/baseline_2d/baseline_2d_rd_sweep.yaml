experiment:
  name: baseline_2d_rd_base
  seed: 42

data:
  difficulty: easy
  batch_size: 64
  num_workers: 0
  pin_memory: false
  persistent_workers: false
  prefetch_factor: 2
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null
  prefer_npy: true
  npy_mmap: true

training:
  use_amp: true
  epochs: 200
  lr: 0.0001

  loss_name: rate_distortion
  rd_lambda: 0.1
  distortion_metric: masked_mse

  grad_clip_max_norm: 1.0
  scheduler:
    enabled: true
    name: cosine
    T_max: 200
    eta_min: 1.0e-6
  early_stopping:
    enabled: true
    patience: 30
    psnr_min_delta: 0.01

model:
  model_name: baseline_2d_ae
  model_kwargs:
    in_channels: 202
    latent_channels: 64
    hidden_channels: [128, 64]

logging:
  use_wandb: true
  project: hsi-compression-paper
