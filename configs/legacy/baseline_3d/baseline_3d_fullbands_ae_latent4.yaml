experiment:
  name: paper_baseline_3d_fullbands_ae_latent4
  seed: 42

data:
  difficulty: easy
  batch_size: 1
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  prefer_npy: true
  npy_mmap: false
  debug_loader_timing: false
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null

training:
  use_amp: true
  epochs: 200
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  scheduler:
    enabled: true
    name: cosine
    T_max: 200
    eta_min: 1.0e-06
  early_stopping:
    enabled: true
    patience: 40
    psnr_min_delta: 0.01

model:
  model_name: baseline_3d_fullbands_ae
  model_kwargs:
    in_channels: 202
    latent_channels: 4
    hidden_channels:
    - 8
    - 16
    - 32
    output_activation: sigmoid

logging:
  use_wandb: true
  project: hsi-compression-paper
