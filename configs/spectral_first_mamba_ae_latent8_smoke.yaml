experiment:
  name: paper_spectral_first_mamba_ae_latent8_smoke
  seed: 42

data:
  difficulty: easy
  batch_size: 1
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2
  prefer_npy: true
  npy_mmap: false
  debug_loader_timing: false
  drop_invalid_channels: true
  train_subset_size: null
  val_subset_size: null

training:
  use_amp: true
  epochs: 5
  lr: 0.0001
  loss_name: masked_mse
  grad_clip_max_norm: 1.0
  quantization_bits: 8
  scheduler:
    enabled: true
    name: cosine
    T_max: 5
    eta_min: 1.0e-06
  early_stopping:
    enabled: true
    patience: 40
    psnr_min_delta: 0.01

model:
  model_name: spectral_first_mamba_ae
  model_kwargs:
    in_channels: 202
    latent_channels: 8
    spectral_d_model: 32
    spectral_out_channels: 64
    spatial_embed_channels: 16
    spatial_context_channels: 64
    num_spectral_blocks: 2
    mamba_d_state: 16
    mamba_d_conv: 4
    mamba_expand: 2
    use_affine_conditioning: false
    output_activation: sigmoid

logging:
  use_wandb: true
  project: hsi-compression-paper
